name: Release

# Runs when a version tag is pushed — tagging is a deliberate human act.
# The result is a DRAFT release: nothing is published until a person
# reviews and clicks publish, keeping publication an explicit decision
# (same posture as merges to main). workflow_dispatch runs the build,
# reproducibility and SBOM jobs as a rehearsal without creating anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  # Required for Sigstore keyless signing (ADR-0039): the workflow exchanges
  # its OIDC identity for a short-lived signing certificate.
  id-token: write

jobs:
  windows-binaries:
    name: Windows binaries (CLI + workers)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries (locked)
        run: >
          cargo build --release --locked
          -p dataforge-cli
          -p df-extract-worker
          -p df-query-worker
          -p df-media-worker

      - name: Collect artifacts and checksums
        shell: bash
        run: |
          mkdir -p dist
          for bin in dataforge df-extract-worker df-query-worker df-media-worker; do
            cp "target/release/$bin.exe" dist/
          done
          cd dist && sha256sum *.exe > SHA256SUMS.txt && cat SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/
          if-no-files-found: error

  reproducibility:
    name: Reproducibility (double clean rebuild)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # No rust-cache here on purpose: both passes must compile everything
      # from scratch so the comparison covers every object file.
      - name: Build twice from scratch and compare
        shell: bash
        run: |
          PKGS="-p dataforge-cli -p df-extract-worker -p df-query-worker -p df-media-worker"
          BINS="dataforge.exe df-extract-worker.exe df-query-worker.exe df-media-worker.exe"
          for pass in A B; do
            rm -rf target/release
            cargo build --release --locked $PKGS
            ( cd target/release && sha256sum $BINS ) > "pass$pass.sha256"
            cat "pass$pass.sha256"
          done
          diff passA.sha256 passB.sha256
          echo "REPRODUCIBLE: byte-identical across two clean rebuilds"

  sbom:
    name: SBOM (regenerate and verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The committed SBOM must match a fresh regeneration against the same
      # Cargo.lock — releasing with a stale SBOM is a hard failure.
      - name: Regenerate and compare
        run: |
          python3 scripts/generate-sbom.py > /tmp/fresh.cdx.json
          diff docs/sbom/dataforge.cdx.json /tmp/fresh.cdx.json
          echo "SBOM is current"

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: docs/sbom/dataforge.cdx.json
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    runs-on: ubuntu-latest
    needs: [windows-binaries, reproducibility, sbom]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Sigstore keyless signing (ADR-0039): no private keys to manage. The
      # ephemeral certificate binds the signature to THIS workflow identity
      # and THIS tag; the human act that authorizes it is pushing the tag.
      # Signing SHA256SUMS.txt covers every binary transitively.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums and SBOM (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature artifacts/windows-binaries/SHA256SUMS.txt.sig \
            --output-certificate artifacts/windows-binaries/SHA256SUMS.txt.pem \
            artifacts/windows-binaries/SHA256SUMS.txt
          cosign sign-blob --yes \
            --output-signature artifacts/sbom/dataforge.cdx.json.sig \
            --output-certificate artifacts/sbom/dataforge.cdx.json.pem \
            artifacts/sbom/dataforge.cdx.json

      - name: Create draft release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Draft — review the artifacts and the CHANGELOG entry, then publish deliberately."
            echo
            echo '## Verificación'
            echo '```'
            echo 'sha256sum -c SHA256SUMS.txt'
            echo 'cosign verify-blob \'
            echo '  --signature SHA256SUMS.txt.sig --certificate SHA256SUMS.txt.pem \'
            echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@.*' \\"
            echo '  --certificate-oidc-issuer https://token.actions.githubusercontent.com \'
            echo '  SHA256SUMS.txt'
            echo '```'
          } > release-notes.md
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft \
            --title "DataForge ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            artifacts/windows-binaries/* \
            artifacts/sbom/dataforge.cdx.json \
            artifacts/sbom/dataforge.cdx.json.sig \
            artifacts/sbom/dataforge.cdx.json.pem
