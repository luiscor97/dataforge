name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual runs on any branch: lets the experimental Linux job iterate
  # without opening a pull request per fix.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # M0.8 (experimental): POSIX compilation and platform-neutral suite.
  # Allowed to fail while Linux/macOS write-safety guarantees mature; the
  # result is visible evidence, never a silent gap and never a gate.
  rust-linux-experimental:
    name: Rust on Linux (experimental M0.8)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --exclude dataforge-desktop --all-targets -- -D warnings

      - name: Tests (platform-neutral subset)
        run: cargo test --workspace --exclude dataforge-desktop

  # M0.9 (experimental): fuzz the untrusted-input parsers with libFuzzer.
  # Allowed to fail while the harnesses mature; a discovered panic is visible
  # evidence, never a silent gap and never a gate. Needs nightly + libFuzzer,
  # so it only runs on Linux and lives in its own workspace (crates/fuzz).
  fuzz:
    name: Fuzz targets (experimental M0.9)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build every fuzz target
        working-directory: fuzz
        run: cargo +nightly fuzz build

      - name: Smoke-run each target (short)
        working-directory: fuzz
        run: |
          for target in fingerprint_parse raw_path_from_blob \
                        extract_worker_response safe_relative_path; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=20 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  rust:
    name: Rust (fmt, clippy, tests, build)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      # df-corpus is not a default member (it is a dev tool), so its fast
      # full-pipeline test needs an explicit invocation. The 100k scale run
      # stays #[ignore]d and on-demand (docs/testing/corpus-and-scale.md).
      - name: Corpus pipeline test
        run: cargo test -p df-corpus

      - name: Build CLI
        run: cargo build -p dataforge-cli

  desktop:
    name: Desktop (typecheck + frontend build + tauri check)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter dataforge-desktop typecheck

      - name: Accessible UI render tests
        run: pnpm --filter dataforge-desktop test:ui

      - name: Build frontend
        run: pnpm --filter dataforge-desktop build

      - name: Check Tauri shell (MSVC)
        run: cargo check -p dataforge-desktop

  hardening:
    name: Filesystem hardening (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # These tests plant real junctions with `mklink /J` and deny read access
      # with `icacls`. They skip loudly (never silently) when the environment
      # forbids it, so a green run here is meaningful evidence.
      - name: Filesystem safety boundary
        run: cargo test -p df-fs-safety -- --nocapture

      - name: Executor and verifier hardening (junctions, no-replace)
        run: cargo test -p df-executor -p df-verifier -- --nocapture

      - name: Tamper tests (manifest, inventory, marker)
        run: cargo test -p df-db -p df-facade -p df-planner

      - name: Migration compatibility (0.1 database opens under 0.1.1)
        run: cargo test -p df-db a_v0_1_database_migrates_forward_and_keeps_its_data -- --nocapture

  supply-chain:
    name: Dependency audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check
